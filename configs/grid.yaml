data_dir: "data"
runs_dir: "runs"

# Logged in run: distractor (fixed 10 paras) vs faiss (index retrieval)
retrieval_mode: "faiss"

# When true, retrieval uses corpus_injected so every search returns potentially poisoned chunks (attack on every run)
use_injected_corpus: true

agent:
  type: "react"  # "planner_executor" or "retrieval_echo"
  max_steps: 12

models:
  mode: "mock"   # "oss_llm" or "api"
  temperature: 0.2
  seed: 0

grid:
  datasets: ["hotpotqa"]
  defenses: ["none", "allowlist", "quote+prov+allowlist", "certificate_gating"]
  channels: ["retrieval"]
  strategies: ["non_adaptive", "evidence_laundering"]
  B_tokens: [50, 150, 300]
  K_sources: [1, 2]
  seeds: [0, 1, 2, 3, 4]
