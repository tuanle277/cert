data_dir: "data"
runs_dir: "runs"

# Logged in run: distractor (fixed 10 paras) vs faiss (index retrieval)
retrieval_mode: "faiss"

# When true, retrieval uses corpus_injected so every search returns potentially poisoned chunks (attack on every run)
use_injected_corpus: true

agent:
  type: "retrieval_echo"  # uses search tool; echoes in mock, sends to LLM in gemini mode
  max_steps: 12

models:
  mode: "mock"     # "mock", "gemini", "api", or "ollama"
  model_name: "llama3.2:3b"
  temperature: 0.2
  seed: 0

grid:
  datasets: ["hotpotqa"]
  defenses: ["none", "quote_only", "provenance_tags", "allowlist", "quote+prov+allowlist", "certificate_gating", "taskshield", "llm_judge", "intentguard"]
  channels: ["retrieval"]
  strategies:
    - non_adaptive
    - goal_laundering
    - evidence_laundering
    - policy_mimicry
    - subtle_redirect
    - footnote_injection
  B_tokens: [50, 150, 300]
  K_sources: [1, 2]
  seeds: [0, 1, 2]
  max_per_cell: 5
